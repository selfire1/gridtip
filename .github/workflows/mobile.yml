name: Mobile CI

on:
  push:
    branches:
      - main
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - 'bun.lock'
      - '.github/workflows/mobile.yml'
  pull_request:
    paths:
      - 'apps/mobile/**'
      - 'packages/shared/**'
      - 'bun.lock'
      - '.github/workflows/mobile.yml'

jobs:
  lint:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version-file: './apps/web/.nvmrc'
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - name: Install dependencies
        run: bun ci
        working-directory: .
      - name: Run lint
        run: bun run lint
